<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>osysHome</title>
<link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/fonts/fontawesome/css/fontawesome-all.min.css">
<link href="{{ config.ASSETS_ROOT }}/plugins/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<style>
.yh-login-card {
    border-radius: 1rem;
}
.yh-login-form .input-group-text {
    min-width: 3rem;
    justify-content: center;
}
</style>
</head>
<body>
<section class="vh-100">
    <div class="container py-4 py-md-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
          <div class="card shadow yh-login-card">
            <div class="card-body p-4 p-md-5 text-center">

              <h3 class="mb-3 h4">osysHome → YandexHome</h3>
              {% if login_failed %}
              <div class="alert alert-danger py-2" role="alert">
                  Неправильное имя и/или пароль
              </div>
              {% endif %}
              <form class="yh-login-form" role="form" method="POST">
                <div class="input-group mb-3">
                  <span class="input-group-text" aria-hidden="true"><i class="fas fa-user"></i></span>
                  <input type="text" name="username" placeholder="Username" class="form-control form-control-lg" autocomplete="username" required>
                </div>

                <div class="input-group mb-4">
                  <span class="input-group-text" aria-hidden="true"><i class="fas fa-lock"></i></span>
                  <input type="password" name="password" placeholder="Password" class="form-control form-control-lg" autocomplete="current-password" required>
                </div>

                <button class="btn btn-primary btn-lg w-100" type="submit" name="login">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
